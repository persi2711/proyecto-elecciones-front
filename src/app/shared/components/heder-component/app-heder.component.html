<mat-toolbar class="header-toolbar">
  <div class="header-content">
    <button mat-icon-button class="mobile-only menu-button" (click)="openSideBar()">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="logo-area" routerLink="/">
      <span class="logo-text">Impulso Ciudadano BC</span>
    </div>

    <nav class="desktop-only nav-list">
      @for (link of layoutService.navRoutes(); track link.path) {
        <a [routerLink]="link.path" routerLinkActive="active" class="nav-link">
          {{ link.label }}
          @if (link.label === 'Consejo Ciudadano') {
            <mat-icon class="ext-icon">open_in_new</mat-icon>
          }
        </a>
      }
    </nav>

    <span class="spacer"></span>

    <div class="actions-area">
      @if (!isBrowser()) {
        <div class="user-skeleton"></div>
      } @else {
        @if (!isBrowser() || isChecking()) {
          <div class="user-skeleton animate-pulse"></div>
        } @else if (user()) {
          <button mat-button class="user-pill" routerLink="/me">
            <mat-icon>account_circle</mat-icon>
            <span class="desktop-only">{{ user().email }}</span>
          </button>
        } @else {
          <a routerLink="/auth/login" class="login-link">
            <mat-icon class="mobile-only menu-button">login</mat-icon>
            <span class="desktop-only">Iniciar Sesión</span>
          </a>
        }
      }
    </div>
  </div>
</mat-toolbar>
